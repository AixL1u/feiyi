server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/feiyi?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  web:
    resources:
      static-locations: classpath:/static/,file:${user.dir}/uploads/

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      update-strategy: NOT_NULL
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: FeiyiHeritageSystemSecretKey2026VeryLongSecretKeyForJWTSigning
    expiration: 86400000
  upload:
    path: ${user.dir}/uploads/
